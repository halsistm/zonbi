<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>屍撃 〜亡者狙撃〜</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: none; }
#game-canvas { display: block; width: 100vw; height: 100vh; }

/* ── HUD ── */
#hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

/* Crosshair */
#crosshair {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 24px; height: 24px;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute;
  background: rgba(255,255,255,0.85);
  box-shadow: 0 0 4px rgba(0,0,0,0.9);
}
#crosshair::before { width: 2px; height: 24px; top: 0; left: 11px; }
#crosshair::after  { width: 24px; height: 2px; top: 11px; left: 0; }
.center-dot {
  position: absolute; width: 4px; height: 4px;
  background: #fff; border-radius: 50%;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}

/* Score panel */
#score-panel {
  position: absolute; top: 14px; right: 18px;
  text-align: right; color: #fff;
  filter: drop-shadow(0 0 6px rgba(0,0,0,0.9));
}
#score-val { font-size: 34px; font-weight: bold; color: #ffd700; letter-spacing: 2px; }
#timer-val { font-size: 13px; color: #88ff88; margin-top: 2px; letter-spacing: 1px; }
#scope-indicator { font-size: 11px; color: #88ccff; margin-top: 3px; letter-spacing: 2px; opacity: 0; transition: opacity 0.2s; }

/* Miss gauge */
#miss-panel { position: absolute; bottom: 24px; left: 18px; }
#miss-label { font-size: 11px; color: #aaa; letter-spacing: 2px; margin-bottom: 6px; }
#miss-icons { display: flex; gap: 6px; }
.miss-icon {
  width: 18px; height: 18px; border-radius: 50%;
  background: #222; border: 1px solid #555;
  transition: all 0.2s;
}
.miss-icon.filled {
  background: #e74c3c;
  border-color: #c0392b;
  box-shadow: 0 0 8px #e74c3c;
}

/* Minimap */
#minimap-wrap { position: absolute; top: 14px; left: 14px; }
#minimap {
  display: block; border-radius: 50%;
  border: 2px solid rgba(0, 255, 100, 0.35);
  box-shadow: 0 0 10px rgba(0,0,0,0.8);
}

/* Hit / Combo text */
#hit-text {
  position: absolute; top: 42%; left: 50%;
  transform: translateX(-50%);
  font-size: 20px; font-weight: bold;
  opacity: 0; pointer-events: none;
  transition: opacity 0.15s;
  text-shadow: 0 0 12px currentColor;
  letter-spacing: 2px;
}
#combo-text {
  position: absolute; top: 37%; left: 50%;
  transform: translateX(-50%);
  font-size: 18px; font-weight: bold; color: #ff8800;
  opacity: 0; pointer-events: none;
  text-shadow: 0 0 12px #ff8800;
  letter-spacing: 3px;
}
#kill-feed {
  position: absolute; top: 15px; left: 50%;
  transform: translateX(-50%);
  font-size: 12px; color: #ffcc00;
  opacity: 0; pointer-events: none;
  letter-spacing: 2px;
}

/* ── SCOPE OVERLAY ── */
#scope-wrap {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 15; display: none;
}
#scope-lens {
  position: absolute;
  width: 58vmin; height: 58vmin;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: transparent;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.94);
  border: 2px solid rgba(0,200,80,0.5);
}
#scope-lens::before {
  content: '';
  position: absolute; inset: 3px;
  border-radius: 50%;
  border: 1px solid rgba(0,200,80,0.2);
}
.scope-line {
  position: absolute; background: rgba(0,200,80,0.55);
  top: 50%; left: 50%;
}
#scope-h { width: 58vmin; height: 1px; transform: translate(-50%, -50%); }
#scope-v { width: 1px; height: 58vmin; transform: translate(-50%, -50%); }
.scope-tick {
  position: absolute; background: rgba(0,200,80,0.4);
  top: 50%; left: 50%;
}
#tick1 { width: 14px; height: 1px; transform: translate(-50%, calc(-50% + 30px)); }
#tick2 { width: 10px; height: 1px; transform: translate(-50%, calc(-50% + 60px)); }
#tick3 { width: 6px; height: 1px; transform: translate(-50%, calc(-50% + 90px)); }
#scope-dist {
  position: absolute; bottom: 12px; right: 16px;
  font-size: 11px; color: rgba(0,220,80,0.7);
  letter-spacing: 2px;
}

/* ── FLASH ── */
#flash {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 20;
  background: rgba(255,255,255,0);
  transition: background 0.12s;
}

/* ── SCREENS ── */
.screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at center, rgba(60,10,0,0.95) 0%, rgba(5,2,0,0.97) 70%),
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 20px,
      rgba(120,60,10,0.04) 20px,
      rgba(120,60,10,0.04) 21px
    );
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 50; color: #fff;
}
.screen-title {
  font-size: 72px; font-weight: 900;
  color: #e8c84a;
  text-shadow:
    0 0 12px #e8c84a,
    0 0 40px rgba(220,150,30,0.7),
    0 0 80px rgba(180,80,10,0.4),
    4px 4px 0px #7a1a00,
    6px 6px 0px #3a0800;
  letter-spacing: 10px;
  font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', serif;
  line-height: 1;
  margin-bottom: 4px;
  position: relative;
}
.screen-title::before {
  content: '⊕';
  position: absolute; top: -36px; left: 50%; transform: translateX(-50%);
  font-size: 20px; color: rgba(220,160,40,0.6);
  letter-spacing: 0;
}
.screen-title::after {
  content: '━━━━━━━━━━━━';
  display: block;
  font-size: 14px; letter-spacing: 0;
  color: rgba(220,150,30,0.5);
  margin-top: 8px;
  text-shadow: none;
}
.screen-sub { font-size: 14px; color: #c8a050; letter-spacing: 6px; margin-bottom: 32px;
  font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
  text-shadow: 0 0 8px rgba(200,150,50,0.6);
}
.btn {
  background: linear-gradient(135deg, #8b1a00, #c0392b, #8b1a00);
  color: #ffd700; border: 1px solid #c89030;
  padding: 13px 42px; font-size: 19px; cursor: pointer;
  border-radius: 2px; margin: 7px;
  font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
  letter-spacing: 4px;
  transition: all 0.15s; pointer-events: all;
  box-shadow: 0 0 0 1px rgba(200,150,50,0.3), inset 0 1px 0 rgba(255,220,100,0.2);
}
.btn:hover { background: linear-gradient(135deg, #a02000, #e74c3c, #a02000); transform: scale(1.05); box-shadow: 0 0 20px rgba(200,100,30,0.5), 0 0 0 1px #c89030; }
.btn-ghost { background: rgba(30,10,0,0.6); border: 1px solid rgba(180,130,50,0.4); color: #a08040; }
.btn-ghost:hover { background: rgba(60,20,0,0.7); transform: scale(1.03); box-shadow: none; }
.screen::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, transparent, #c89030, #e8c84a, #c89030, transparent);
}
.screen::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, transparent, #c89030, #e8c84a, #c89030, transparent);
}
.instructions { font-size: 13px; color: #888; text-align: center;
  line-height: 2.2; margin: 18px 0 32px; font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
}
.instructions span { color: #e8c84a; }
.stat-row { display: flex; gap: 60px; margin: 8px 0 30px; }
.stat-box { text-align: center; }
.stat-val { font-size: 38px; font-weight: bold; color: #ffd700; }
.stat-label { font-size: 12px; color: #777; letter-spacing: 2px; margin-top: 3px; }

/* Danger indicator */
#danger-ring {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 9;
  border: 4px solid transparent;
  transition: border-color 0.2s;
}
#danger-ring.active { border-color: rgba(255,0,0,0.4); box-shadow: inset 0 0 40px rgba(255,0,0,0.2); }

/* Pause overlay */
#pause-overlay {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.8); color: #fff;
  padding: 20px 50px; font-size: 22px;
  letter-spacing: 4px; z-index: 60;
  display: none; pointer-events: none;
}

/* ── TOUCH CONTROLS ── */
#touch-controls {
  position: fixed; bottom: 0; right: 0;
  display: none;
  z-index: 30; padding: 0 16px 24px 0;
  gap: 16px; flex-direction: column; align-items: flex-end;
  pointer-events: none;
}
.touch-btn {
  pointer-events: all;
  width: 76px; height: 76px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.25);
  background: rgba(0,0,0,0.55);
  color: #fff;
  font-size: 28px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  transition: background 0.1s, transform 0.08s;
  backdrop-filter: blur(4px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}
.touch-btn:active { background: rgba(255,255,255,0.18); transform: scale(0.93); }
#fire-btn {
  width: 90px; height: 90px;
  background: rgba(180,20,20,0.7);
  border-color: rgba(255,80,80,0.45);
  font-size: 34px;
  box-shadow: 0 0 18px rgba(200,30,30,0.5), 0 4px 20px rgba(0,0,0,0.6);
}
#fire-btn.active { background: rgba(255,50,50,0.85); }
#scope-btn.scoped {
  background: rgba(0,180,80,0.65);
  border-color: rgba(0,255,100,0.45);
  box-shadow: 0 0 14px rgba(0,200,80,0.5), 0 4px 20px rgba(0,0,0,0.6);
}
#touch-pause-btn {
  position: fixed; top: 14px; right: 14px;
  display: none;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
  color: #fff; font-size: 16px; z-index: 31;
  align-items: center; justify-content: center;
  pointer-events: all; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  backdrop-filter: blur(4px);
  text-align: center; line-height: 44px;
}

/* Mobile HUD adjustments */
@media (max-width: 812px) {
  #score-panel { top: 10px; right: 70px; }
  #score-val { font-size: 26px; }
  #timer-val { font-size: 12px; }
  #miss-panel { bottom: 28px; left: 14px; }
  #hit-text { font-size: 17px; }
  #combo-text { font-size: 15px; }
  .screen-title { font-size: 36px; letter-spacing: 4px; }
  .screen-sub { font-size: 13px; }
  .btn { font-size: 16px; padding: 12px 32px; }
  .stat-row { gap: 30px; }
  .stat-val { font-size: 28px; }
  .instructions { font-size: 12px; line-height: 2.0; }
}

/* Prevent iOS rubber-band scroll */
html, body { overscroll-behavior: none; touch-action: none; }
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="crosshair"><div class="center-dot"></div></div>

  <div id="score-panel">
    <div id="score-val">00000</div>
    <div id="timer-val">00:00</div>
    <div id="scope-indicator">◉ SCOPED</div>
  </div>

  <div id="miss-panel">
    <div id="miss-label">MISS</div>
    <div id="miss-icons">
      <div class="miss-icon" id="mi0"></div>
      <div class="miss-icon" id="mi1"></div>
      <div class="miss-icon" id="mi2"></div>
      <div class="miss-icon" id="mi3"></div>
      <div class="miss-icon" id="mi4"></div>
    </div>
  </div>

  <div id="minimap-wrap">
    <canvas id="minimap" width="110" height="110" style="display:block;border-radius:50%;border:2px solid rgba(0,255,100,0.35);box-shadow:0 0 10px rgba(0,0,0,0.8);"></canvas>
  </div>

  <div id="hit-text"></div>
  <div id="combo-text"></div>
  <div id="kill-feed"></div>
</div>

<!-- Scope overlay -->
<div id="scope-wrap">
  <div id="scope-lens"></div>
  <div class="scope-line" id="scope-h"></div>
  <div class="scope-line" id="scope-v"></div>
  <div class="scope-tick" id="tick1"></div>
  <div class="scope-tick" id="tick2"></div>
  <div class="scope-tick" id="tick3"></div>
  <div id="scope-dist">0m</div>
  <div id="scope-drop-label" style="
    position:absolute; top: calc(50% + 38px); left: 50%;
    transform: translateX(-50%);
    font-size:10px; color:rgba(0,220,80,0.55);
    letter-spacing:2px; text-align:center; white-space:nowrap;
  "></div>
</div>

<!-- Flash / Danger -->
<div id="flash"></div>
<div id="danger-ring"></div>

<!-- Touch Controls (shown on mobile) -->
<div id="touch-controls">
  <button class="touch-btn" id="scope-btn">◉</button>
  <button class="touch-btn" id="fire-btn">🔫</button>
</div>
<div id="touch-pause-btn">⏸</div>

<!-- Pause -->
<div id="pause-overlay">⏸ PAUSED</div>

<!-- Title -->
<div class="screen" id="title-screen">
  <div class="screen-title">屍　撃</div>
  <div class="screen-sub">亡者狙撃　〜廃都の夜〜</div>
  <div class="instructions" id="pc-instructions">
    <span>マウス移動</span> → 照準 &nbsp;|&nbsp;
    <span>左クリック</span> → 射撃<br>
    <span>右クリック / Z</span> → スコープON/OFF<br>
    <span>ヘッドショット +200pt</span> &nbsp;|&nbsp; <span>胴体 +100pt</span><br>
    ゾンビを5体見逃すとゲームオーバー
  </div>
  <div class="instructions" id="touch-instructions" style="display:none">
    <span>スワイプ</span> → 照準 &nbsp;|&nbsp;
    <span>🔫 ボタン</span> → 射撃<br>
    <span>◉ ボタン</span> → スコープON/OFF<br>
    <span>ヘッドショット +200pt</span> &nbsp;|&nbsp; <span>胴体 +100pt</span><br>
    ゾンビを5体見逃すとゲームオーバー
  </div>
  <button class="btn" id="start-btn">▶ GAME START</button>
</div>

<!-- Gameover -->
<div class="screen" id="gameover-screen" style="display:none">
  <div class="screen-title">討　死</div>
  <div class="stat-row">
    <div class="stat-box">
      <div class="stat-val" id="final-score">00000</div>
      <div class="stat-label">SCORE</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="final-time">00:00</div>
      <div class="stat-label">SURVIVAL</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="final-kills">0</div>
      <div class="stat-label">KILLS</div>
    </div>
  </div>
  <button class="btn" id="retry-btn">↺ もう一度</button>
  <button class="btn btn-ghost" id="title-btn">タイトルへ</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>
<script>
'use strict';

// ════════════════════════════════════════════
// RENDERER + SCENE
// ════════════════════════════════════════════
const canvas = document.getElementById('game-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x06030f);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 2.2;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x06030f, 0.006);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 1.7, 9);
camera.rotation.order = 'YXZ';

// ════════════════════════════════════════════
// LIGHTING
// ════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x4060a0, 2.8));

const moonLight = new THREE.DirectionalLight(0x6090cc, 2.2);
moonLight.position.set(60, 120, 40);
moonLight.castShadow = true;
moonLight.shadow.mapSize.setScalar(2048);
moonLight.shadow.camera.near = 1;
moonLight.shadow.camera.far = 400;
moonLight.shadow.camera.left = -120;
moonLight.shadow.camera.right = 120;
moonLight.shadow.camera.top = 120;
moonLight.shadow.camera.bottom = -120;
moonLight.shadow.bias = -0.001;
scene.add(moonLight);

// Fill light from above to prevent pitch black areas
const fillLight = new THREE.DirectionalLight(0x2040a0, 1.0);
fillLight.position.set(-40, 80, 60);
scene.add(fillLight);

// Warm fill from below (reflected street light)
const streetGlow = new THREE.HemisphereLight(0x1a1a3a, 0x3a2200, 1.2);
scene.add(streetGlow);

// Fire point lights
const fireLights = [];
[[-16,3,-28],[22,3,-48],[-6,3,-68],[19,3,-18],[-26,3,-52]].forEach(([x,y,z]) => {
  const fl = new THREE.PointLight(0xff6600, 6.0, 55, 1.5);
  fl.position.set(x, y, z);
  scene.add(fl);
  fireLights.push(fl);
});

// ════════════════════════════════════════════
// PROCEDURAL TEXTURES
// ════════════════════════════════════════════
function _mkNoise(ctx, w, h, count, alpha) {
  for (let i = 0; i < count; i++) {
    const x = Math.random()*w, y = Math.random()*h;
    const v = (Math.random()*25+4)|0;
    ctx.fillStyle = `rgba(${v},${v},${v},${alpha})`;
    ctx.fillRect(x, y, Math.random()*3+1, Math.random()*3+1);
  }
}
function mkAsphalt() {
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#080709'; ctx.fillRect(0,0,256,256);
  _mkNoise(ctx, 256,256, 18000, 0.38);
  for (let i=0; i<10; i++) {
    ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 0.7;
    ctx.beginPath(); let cx=Math.random()*256, cy=Math.random()*256; ctx.moveTo(cx,cy);
    for (let s=0; s<9; s++) { cx+=(Math.random()-0.5)*22; cy+=Math.random()*22; ctx.lineTo(cx,cy); }
    ctx.stroke();
  }
  const t = new THREE.CanvasTexture(c); t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.encoding = THREE.sRGBEncoding; return t;
}
function mkConcrete(baseL) {
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const ctx = c.getContext('2d');
  const b = (baseL*255)|0;
  ctx.fillStyle = `rgb(${b-4},${b-7},${b+1})`; ctx.fillRect(0,0,256,256);
  _mkNoise(ctx, 256,256, 14000, 0.38);
  for (let i=0; i<14; i++) {
    const x = Math.random()*256;
    const g = ctx.createLinearGradient(x,0,x,256);
    g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(0.4+Math.random()*0.3,'rgba(0,0,0,0.18)'); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.strokeStyle = g; ctx.lineWidth = 1+Math.random()*2.5;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x+(Math.random()-0.5)*12,256); ctx.stroke();
  }
  const t = new THREE.CanvasTexture(c); t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.encoding = THREE.sRGBEncoding; return t;
}
function mkBrick() {
  const c = document.createElement('canvas'); c.width=256; c.height=256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#0b0a0e'; ctx.fillRect(0,0,256,256);
  const bW=32, bH=15;
  for (let row=0; row*bH<270; row++) {
    const off = (row%2)*16;
    for (let col=-1; col*bW<280; col++) {
      const x=col*bW+off, y=row*bH;
      const lv = ((0.08+Math.random()*0.07)*255)|0;
      ctx.fillStyle = `rgb(${lv-4|0},${lv-9|0},${lv-2|0})`; ctx.fillRect(x+1,y+1,bW-2,bH-2);
      for (let n=0; n<10; n++) {
        ctx.fillStyle = `rgba(0,0,0,${0.1+Math.random()*0.25})`;
        ctx.fillRect(x+1+Math.random()*(bW-2), y+1+Math.random()*(bH-2), 2, 1);
      }
    }
  }
  const t = new THREE.CanvasTexture(c); t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.encoding = THREE.sRGBEncoding; return t;
}
function mkSkin() {
  const c = document.createElement('canvas'); c.width=c.height=128;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#3d4e2f'; ctx.fillRect(0,0,128,128);

  }
  for (let i=0; i<7; i++) {
    const x=Math.random()*128, y=Math.random()*128;
    ctx.fillStyle = `rgba(${(40+Math.random()*25)|0},0,0,0.72)`;
    ctx.beginPath(); ctx.ellipse(x,y,Math.random()*13+4,Math.random()*8+2,Math.random()*Math.PI,0,Math.PI*2); ctx.fill();
  }
  const t = new THREE.CanvasTexture(c);
  t.encoding = THREE.sRGBEncoding; return t;
}
function mkCloth(hue) {
  const c = document.createElement('canvas'); c.width=c.height=128;
  const ctx = c.getContext('2d');
  const col = new THREE.Color().setHSL(hue, 0.18, 0.1);
  const br = (col.r*255)|0, bg = (col.g*255)|0, bb = (col.b*255)|0;
  ctx.fillStyle = `rgb(${br},${bg},${bb})`; ctx.fillRect(0,0,128,128);
  for (let y=0; y<128; y+=3) for (let x=0; x<128; x+=3) {
    const shift = ((x+y)%6<3) ? 7 : -5;
    ctx.fillStyle = `rgb(${Math.max(0,br+shift)},${Math.max(0,bg+shift)},${Math.max(0,bb+shift)})`;
    ctx.fillRect(x,y,3,3);
  }
  for (let i=0; i<1200; i++) {
    ctx.fillStyle = `rgba(0,0,0,${0.15+Math.random()*0.35})`;
    ctx.fillRect(Math.random()*128, Math.random()*128, Math.random()*4+1, Math.random()*4+1);
  }
  const t = new THREE.CanvasTexture(c); t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.encoding = THREE.sRGBEncoding; return t;
}
function mkRust() {
  const c = document.createElement('canvas'); c.width=c.height=128;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#100303'; ctx.fillRect(0,0,128,128);
  for (let i=0; i<3000; i++) {

  t.encoding = THREE.sRGBEncoding; return t;
}

const MISS_Z = 7;
const SPAWN_Z_NEAR = -55;
const SPAWN_Z_FAR  = -95;

// GLB blob URL cache — fetch blob once, re-parse per zombie (avoids skeleton clone bugs)
const _glbBlobUrls   = {};
const _glbFetching   = {};
const _glbFetchCbs   = {};

function fetchGLBUrl(filename, onReady) {
  if (_glbBlobUrls[filename]) { onReady(_glbBlobUrls[filename]); return; }
  if (!_glbFetchCbs[filename]) _glbFetchCbs[filename] = [];
  _glbFetchCbs[filename].push(onReady);
  if (_glbFetching[filename]) return;
  _glbFetching[filename] = true;
  fetch(filename)
    .then(r => r.blob())
    .then(blob => {
      _glbBlobUrls[filename] = URL.createObjectURL(blob);
      _glbFetchCbs[filename].forEach(cb => cb(_glbBlobUrls[filename]));
      _glbFetchCbs[filename] = [];
    })
    .catch(() => {
      _glbBlobUrls[filename] = filename; // fallback to direct path
      _glbFetchCbs[filename].forEach(cb => cb(filename));
      _glbFetchCbs[filename] = [];
    });
}

class Zombie {
  constructor(x, z, hp, speed) {
    this.hp = hp;
    this.maxHp = hp;
    this.speed = speed;
    this.isDead = false;
    this.isMissed = false;
    this.dyingTimer = 0;
    this.mixer = null;
    this.walkAction = null;

    this.group = new THREE.Group();
    this.group.position.set(x, 0, z);
    scene.add(this.group);

    // Raycasting placeholder meshes (invisible, match model bounds)
    // Will be replaced once GLB is loaded
    this.torso = new THREE.Mesh(
      new THREE.BoxGeometry(0.6, 1.0, 0.4),
      new THREE.MeshBasicMaterial({ visible: false })
    );
    this.torso.position.y = 0.9;
    this.head = new THREE.Mesh(
      new THREE.SphereGeometry(0.25, 6, 4),
      new THREE.MeshBasicMaterial({ visible: false })
    );
    this.head.position.y = 1.7;
    this.group.add(this.torso, this.head);

    this.torso.userData = { zombie: this, part: 'body' };
    this.head.userData  = { zombie: this, part: 'head' };

    this._meshes = [];
    this._loaded = false;

    // Pick random model, load fresh instance (no skeleton-clone bugs)
    this._glbFile = Math.random() < 0.5 ? 'Untitled.glb' : 'Untitled2.glb';
    fetchGLBUrl(this._glbFile, url => {
      if (this.isDead || this.isMissed) return;
      const loader = new THREE.GLTFLoader();
      loader.load(url, gltf => this._onGLBLoaded(gltf),
                  undefined, err => console.error('Zombie load error:', err));
    });
  }

  _onGLBLoaded(gltf) {
    if (this.isDead || this.isMissed) return;

    const root = gltf.scene;

    // ── Reliable scale calculation using Box3 ──
    // Compute actual bounding box in local space (includes all child transforms)
    const box = new THREE.Box3().setFromObject(root);
    const naturalH = box.max.y - box.min.y;
    const desiredH = 1.8; // metres
    const scaleFactor = naturalH > 0.0001 ? desiredH / naturalH : 1;
    root.scale.setScalar(scaleFactor);

    // Ground the model (feet at y=0)
    root.position.y = -box.min.y * scaleFactor;

    this.group.add(root);
    this._modelRoot = root;

    // Collect meshes
    const fullH = desiredH;
    root.traverse(obj => {
      if (obj.isMesh) {
        obj.castShadow = true;
        this._meshes.push(obj);
        obj.userData = { zombie: this, part: 'body' };
      }
    });

    // Invisible hitboxes
    this.group.remove(this.torso);
    this.group.remove(this.head);

    this.torso = new THREE.Mesh(
      new THREE.BoxGeometry(fullH * 0.36, fullH * 0.40, fullH * 0.26),
      new THREE.MeshBasicMaterial({ visible: false })
    );
    this.torso.position.y = fullH * 0.52;
    this.torso.userData = { zombie: this, part: 'body' };

    this.head = new THREE.Mesh(
      new THREE.SphereGeometry(fullH * 0.12, 6, 4),
      new THREE.MeshBasicMaterial({ visible: false })
    );
    this.head.position.y = fullH * 0.87;
    this.head.userData = { zombie: this, part: 'head' };

    this.group.add(this.torso, this.head);

    // Animations
    if (gltf.animations && gltf.animations.length > 0) {
      this.mixer = new THREE.AnimationMixer(root);
      const clip =
        gltf.animations.find(c => /walk/i.test(c.name)) ||
        gltf.animations.find(c => /run/i.test(c.name))  ||
        gltf.animations[0];
      this.walkAction = this.mixer.clipAction(clip);
      this.walkAction.setLoop(THREE.LoopRepeat, Infinity);
      this.walkAction.timeScale = this.speed * 0.9;
      this.walkAction.play();
    }

    this._loaded = true;
  }

  update(dt) {
    if (this.isDead) {
      this.dyingTimer += dt;
      this.group.rotation.z = Math.min(Math.PI / 2, this.dyingTimer * 2.8);
      this.group.position.y = -Math.min(0.6, this.dyingTimer * 0.5);
      if (this.mixer) this.mixer.update(dt);
      if (this.dyingTimer > 1.8) { scene.remove(this.group); return 'remove'; }
      return 'dead';
    }

    // Move toward player
    const tx = 0, tz = MISS_Z;
    const dx = tx - this.group.position.x;
    const dz = tz - this.group.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist > 0.4) {
      const inv = 1 / dist;
      this.group.position.x += dx * inv * this.speed * dt;
      this.group.position.z += dz * inv * this.speed * dt;
      this.group.rotation.y = Math.atan2(dx, dz);
    }

    if (this.mixer) this.mixer.update(dt);

    if (this.group.position.z >= MISS_Z && !this.isMissed) {
      this.isMissed = true;
      scene.remove(this.group);
      return 'missed';
    }
    return 'alive';
  }

  takeDamage(part) {
    if (this.isDead) return false;
    this.hp -= (part === 'head') ? this.hp : 1;
    // Flash red
    this._meshes.forEach(m => {
      if (m.material) {
        if (Array.isArray(m.material)) {
          m.material.forEach(mat => { if (mat.emissive) { mat.emissive.set(0.6, 0, 0); mat.emissiveIntensity = 1.0; } });
        } else if (m.material.emissive) {
          m.material.emissive.set(0.6, 0, 0);
          m.material.emissiveIntensity = 1.0;
        }
      }
    });
    setTimeout(() => {
      if (!this.isDead) {
        this._meshes.forEach(m => {
          if (!m.material) return;
          const mats = Array.isArray(m.material) ? m.material : [m.material];
          mats.forEach(mat => { if (mat.emissive) { mat.emissive.set(0, 0, 0); mat.emissiveIntensity = 0; } });
        });
      }
    }, 90);
    if (this.hp <= 0) {
      this.isDead = true;
      if (this.mixer) this.mixer.stopAllAction();
      return true;
    }
    return false;
  }

  destroy() { scene.remove(this.group); }

  distanceToPlayer() {
    const px = camera.position.x, pz = camera.position.z;
    const dx = this.group.position.x - px;
    const dz = this.group.position.z - pz;
    return Math.sqrt(dx * dx + dz * dz);
  }
}

document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === canvas;
  if (!pointerLocked && gameState === 'playing' && !isTouchDevice) {
    gameState = 'paused';
    document.getElementById('pause-overlay').style.display = 'block';
  }
});

document.addEventListener('mousemove', e => {
  if (isTouchDevice) return;
  if (!pointerLocked || gameState !== 'playing') return;
  const sens = isScoped ? 0.00075 : 0.0018;
  yaw   -= e.movementX * sens;
  pitch -= e.movementY * sens * 0.45;
  yaw   = Math.max(-MAX_YAW,   Math.min(MAX_YAW,   yaw));
  pitch = Math.max(MIN_PITCH,  Math.min(MAX_PITCH,  pitch));
});

document.addEventListener('mousedown', e => {
  if (isTouchDevice) return;
  if (gameState === 'paused') {
    gameState = 'playing';
    document.getElementById('pause-overlay').style.display = 'none';
    canvas.requestPointerLock();
    return;
  }
  if (gameState !== 'playing') return;
  if (!pointerLocked) { canvas.requestPointerLock(); return; }
  if (e.button === 0) shoot();
  if (e.button === 2) toggleScope();
});
document.addEventListener('contextmenu', e => e.preventDefault());

document.addEventListener('keydown', e => {
  if (e.code === 'KeyZ' && gameState === 'playing') toggleScope();
  if (e.code === 'Escape') {
    if (gameState === 'playing') {
      document.exitPointerLock();
    } else if (gameState === 'paused') {
      gameState = 'playing';
      document.getElementById('pause-overlay').style.display = 'none';
      canvas.requestPointerLock();
    }
  }
});

// ── TOUCH INPUT ──
let lastTouchX = 0, lastTouchY = 0;
let lookTouchId = null;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameState === 'title') { startGame(); return; }
  if (gameState === 'paused') {
    gameState = 'playing';
    document.getElementById('pause-overlay').style.display = 'none';
    return;
  }
  if (gameState !== 'playing') return;
  // Track first touch on canvas as look touch
  for (const t of e.changedTouches) {
    if (lookTouchId === null) {
      lookTouchId = t.identifier;
      lastTouchX = t.clientX;
      lastTouchY = t.clientY;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (gameState !== 'playing') return;
  for (const t of e.changedTouches) {
    if (t.identifier === lookTouchId) {
      const dx = t.clientX - lastTouchX;
      const dy = t.clientY - lastTouchY;
      const sens = isScoped ? 0.0028 : 0.0065;
      yaw   -= dx * sens;
      pitch -= dy * sens * 0.45;
      yaw   = Math.max(-MAX_YAW,   Math.min(MAX_YAW,   yaw));
      pitch = Math.max(MIN_PITCH,  Math.min(MAX_PITCH,  pitch));
      lastTouchX = t.clientX;
      lastTouchY = t.clientY;
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === lookTouchId) lookTouchId = null;
  }
}, { passive: false });

// ── 距離偏差（仕様書準拠）──
// 距離に応じた弾落ち量をNDC Y座標オフセットで返す
function getBulletDrop(dist) {
  if (dist <= 30)  return 0;
  if (dist <= 60)  return -0.05;   // 5%下
  if (dist <= 100) return -0.15;   // 15%下
  return -0.30;                    // 30%下
}

// 距離偏差のラベル表示用
function getDropLabel(dist) {
  if (dist <= 30)  return null;
  if (dist <= 60)  return '↓ 5%';
  if (dist <= 100) return '↓ 15%';
  return '↓ 30%';
}

function shoot() {
  if (!canShoot) return;
  muzzleFlash();

  const allMeshes = [];
  zombies.forEach(z => { if (!z.isDead && !z.isMissed) allMeshes.push(z.head, z.torso); });

  // ── Step1: 照準中心で射線を飛ばして距離を測る ──
  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  const centerHits = raycaster.intersectObjects(allMeshes);

  // 距離推定：中心にヒットがあればその距離、なければ最近ゾンビへの距離
  let estimatedDist = 120;
  if (centerHits.length > 0) {
    estimatedDist = centerHits[0].distance;
  } else if (zombies.length > 0) {
    // 近いゾンビへのおよその距離
    let minD = Infinity;
    zombies.forEach(z => { if (!z.isDead && !z.isMissed) minD = Math.min(minD, z.distanceToPlayer()); });
    if (minD < Infinity) estimatedDist = minD;
  }

  // ── Step2: 距離偏差オフセットで実際の着弾射線を再キャスト ──
  const dropOffset = isScoped ? getBulletDrop(estimatedDist) : getBulletDrop(estimatedDist) * 1.8;
  // スコープなしはさらに散弾補正（仕様書：命中率大幅低下）
  const spreadX = isScoped ? 0 : (Math.random() - 0.5) * 0.18;
  const spreadY = isScoped ? dropOffset : dropOffset + (Math.random() - 0.5) * 0.18;

  raycaster.setFromCamera(new THREE.Vector2(spreadX, spreadY), camera);
  const hits = raycaster.intersectObjects(allMeshes);

  // ── 着弾判定 ──
  if (hits.length > 0) {
    const { zombie, part } = hits[0].object.userData;
    if (zombie && !zombie.isDead) {
      const killed = zombie.takeDamage(part);
      if (killed) {
        kills++;
        combo++;
        comboTimer = 2.8;
        const base = part === 'head' ? 200 : 100;
        const mult = combo >= 3 ? Math.min(3.0, 1 + (combo-1) * 0.5) : 1;
        const pts  = Math.round(base * mult);
        score += pts;
        updateScoreHUD();
        if (part === 'head') showHit(`HEAD SHOT  +${pts}`, '#ff2200');
        else                  showHit(`KILL  +${pts}`,      '#ffaa00');
        if (combo >= 3)       showCombo(combo, mult);
      } else {
        showHit('HIT', '#ffffff');
      }
    }
  }

  // ── リコイル適用 ──
  // pitch/yaw 本体に直接加算（永続・元には戻らない）
  const recoilAmt = isScoped ? 0.028 : 0.10;
  pitch += recoilAmt;                                       // 上方向キック（正値 = 上向き）
  yaw   += (Math.random() - 0.5) * recoilAmt * 0.55;       // ランダム横ブレ（永続）
  pitch  = Math.max(MIN_PITCH, Math.min(MAX_PITCH, pitch)); // 範囲クランプ

  // 視覚的な瞬間スナップ（すぐ消える演出のみ）
  recoilPitch = recoilAmt * 0.4;
  recoilYaw   = (Math.random() - 0.5) * recoilAmt * 0.25;

  // 距離偏差HUD表示
  const dropLbl = getDropLabel(Math.round(estimatedDist));
  if (dropLbl && isScoped) {
    showHit(dropLbl + `  ${Math.round(estimatedDist)}m`, '#88ddff');
  }

  canShoot = false;
  shootCooldown = isScoped ? 0.8 : 1.1;
}

function muzzleFlash() {
  const f = document.getElementById('flash');
  f.style.background = 'rgba(255,200,60,0.18)';
  setTimeout(() => { f.style.background = 'rgba(255,255,255,0)'; }, 75);
}

// ════════════════════════════════════════════
// HUD HELPERS
// ════════════════════════════════════════════
function updateScoreHUD() {
  document.getElementById('score-val').textContent = String(score).padStart(5,'0');
}
function updateTimerHUD() {
  const m = Math.floor(elapsedTime / 60);
  const s = Math.floor(elapsedTime % 60);
  document.getElementById('timer-val').textContent =
    String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
function updateMissHUD() {
  for (let i = 0; i < 5; i++) {
    document.getElementById('mi' + i).classList.toggle('filled', i < misses);
  }
}

let hitTO = null;
function showHit(text, color) {
  const el = document.getElementById('hit-text');
  el.textContent = text; el.style.color = color; el.style.opacity = '1';
  if (hitTO) clearTimeout(hitTO);
  hitTO = setTimeout(() => { el.style.opacity = '0'; }, 700);
}
let comboTO = null;
function showCombo(n, m) {
  const el = document.getElementById('combo-text');
  el.textContent = `COMBO ×${n}  (×${m.toFixed(1)})`; el.style.opacity = '1';
  if (comboTO) clearTimeout(comboTO);
  comboTO = setTimeout(() => { el.style.opacity = '0'; }, 1100);
}

function recordMiss() {
  misses++;
  score = Math.max(0, score - 50);
  updateScoreHUD();
  updateMissHUD();
  combo = 0;
  // Red danger flash
  const f = document.getElementById('flash');
  const d = document.getElementById('danger-ring');
  f.style.background = 'rgba(255,0,0,0.32)';
  d.classList.add('active');
  setTimeout(() => {
    f.style.background = 'rgba(255,255,255,0)';
    d.classList.remove('active');
  }, 300);
  if (misses >= 5) gameOver();
}

// ════════════════════════════════════════════
// MINIMAP
// ════════════════════════════════════════════
const mmCanvas = document.getElementById('minimap');
const mmCtx    = mmCanvas.getContext('2d');
const MM_W = mmCanvas.width;
const MM_H = mmCanvas.height;
const MM_CX = MM_W / 2, MM_CY = MM_H / 2;
const MM_RANGE = 90;

function drawMinimap() {
  mmCtx.clearRect(0, 0, MM_W, MM_H);

  // BG
  mmCtx.fillStyle = 'rgba(0,15,5,0.78)';
  mmCtx.beginPath(); mmCtx.arc(MM_CX, MM_CY, MM_CX-1, 0, Math.PI*2); mmCtx.fill();

  // Grid
  mmCtx.strokeStyle = 'rgba(0,80,20,0.25)'; mmCtx.lineWidth = 0.5;
  for (let i = -5; i <= 5; i++) {
    const p = MM_CX + i * 10;
    mmCtx.beginPath(); mmCtx.moveTo(p, 1); mmCtx.lineTo(p, MM_H-1); mmCtx.stroke();
    mmCtx.beginPath(); mmCtx.moveTo(1, p); mmCtx.lineTo(MM_W-1, p); mmCtx.stroke();
  }

  mmCtx.save();
  mmCtx.beginPath(); mmCtx.arc(MM_CX, MM_CY, MM_CX-1, 0, Math.PI*2); mmCtx.clip();

  // Zombies (rotated by camera yaw so "up" = player facing)
  const cosY = Math.cos(-yaw), sinY = Math.sin(-yaw);
  zombies.forEach(z => {
    if (z.isDead || z.isMissed) return;
    const wx = z.group.position.x;
    const wz = z.group.position.z - camera.position.z;
    const rx =  wx * cosY - wz * sinY;
    const rz =  wx * sinY + wz * cosY;
    const mx = MM_CX + rx * (MM_CX / MM_RANGE * 2.2);
    const my = MM_CY + rz * (MM_CY / MM_RANGE * 2.2);
    const alpha = Math.max(0.4, 1 - z.distanceToPlayer() / MM_RANGE);
    mmCtx.fillStyle = `rgba(255,50,50,${alpha})`;
    mmCtx.beginPath(); mmCtx.arc(mx, my, 3.5, 0, Math.PI*2); mmCtx.fill();
  });

  // Player triangle (always at center, pointing up)
  mmCtx.fillStyle = '#00ff88';
  mmCtx.beginPath();
  mmCtx.moveTo(MM_CX, MM_CY - 8);
  mmCtx.lineTo(MM_CX - 5, MM_CY + 5);
  mmCtx.lineTo(MM_CX + 5, MM_CY + 5);
  mmCtx.closePath(); mmCtx.fill();

  mmCtx.restore();

  // Border
  mmCtx.strokeStyle = 'rgba(0,255,80,0.35)'; mmCtx.lineWidth = 1.5;
  mmCtx.beginPath(); mmCtx.arc(MM_CX, MM_CY, MM_CX-1, 0, Math.PI*2); mmCtx.stroke();
}

// Scope distance update
function updateScopeDist() {
  if (!isScoped) return;
  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  const meshes = [];
  zombies.forEach(z => { if (!z.isDead) meshes.push(z.head, z.torso); });
  const hits = raycaster.intersectObjects(meshes);
  const dist = hits.length > 0 ? Math.round(hits[0].distance) : null;
  const distEl = document.getElementById('scope-dist');
  if (dist !== null) {
    const drop = getDropLabel(dist);
    distEl.textContent = dist + 'm' + (drop ? '  ' + drop : '  ✓');
    distEl.style.color = dist > 100 ? 'rgba(255,120,60,0.85)' :
                         dist > 60  ? 'rgba(255,220,60,0.85)' :
                                      'rgba(0,220,80,0.75)';
    const lbl = document.getElementById('scope-drop-label');
    if (lbl) lbl.textContent = dist > 30 ? `弾落ち補正 ${dist > 100 ? '大' : dist > 60 ? '中' : '小'}` : '';
  } else {
    distEl.textContent = '---m';
    distEl.style.color = 'rgba(0,220,80,0.5)';
    const lbl = document.getElementById('scope-drop-label');
    if (lbl) lbl.textContent = '';
  }
}

// ════════════════════════════════════════════
// GAME FLOW
// ════════════════════════════════════════════
function startGame() {
  gameState = 'playing';
  score = 0; misses = 0; kills = 0;
  combo = 0; comboTimer = 0;
  elapsedTime = 0; spawnTimer = 1.5;
  isScoped = false; canShoot = true; shootCooldown = 0;
  yaw = 0; pitch = -0.12;
  recoilPitch = 0; recoilYaw = 0;
  lookTouchId = null;

  zombies.forEach(z => z.destroy()); zombies = [];

  updateScoreHUD(); updateMissHUD(); updateTimerHUD();
  document.getElementById('title-screen').style.display     = 'none';
  document.getElementById('gameover-screen').style.display  = 'none';
  document.getElementById('scope-wrap').style.display       = 'none';
  document.getElementById('crosshair').style.display        = 'block';
  document.getElementById('scope-indicator').style.opacity  = '0';
  document.getElementById('pause-overlay').style.display    = 'none';
  document.getElementById('scope-btn').classList.remove('scoped');

  camera.fov = 75; camera.updateProjectionMatrix();
  if (!isTouchDevice) canvas.requestPointerLock();
  else pointerLocked = true; // Allow input on touch without pointer lock
}

function gameOver() {
  gameState = 'gameover';
  if (!isTouchDevice) document.exitPointerLock();
  else pointerLocked = false;
  lookTouchId = null;
  if (isScoped) { isScoped = false; document.getElementById('scope-wrap').style.display = 'none'; }
  const m = Math.floor(elapsedTime / 60);
  const s = Math.floor(elapsedTime % 60);
  document.getElementById('final-score').textContent = String(score).padStart(5,'0');
  document.getElementById('final-time').textContent  = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  document.getElementById('final-kills').textContent = kills;
  document.getElementById('gameover-screen').style.display = 'flex';
}

document.getElementById('start-btn').addEventListener('click',  startGame);
document.getElementById('retry-btn').addEventListener('click',  startGame);
document.getElementById('title-btn').addEventListener('click', () => {
  zombies.forEach(z => z.destroy()); zombies = [];
  gameState = 'title';
  lookTouchId = null;
  document.getElementById('gameover-screen').style.display = 'none';
  document.getElementById('title-screen').style.display    = 'flex';
  yaw = 0;
});

// Touch pause button
document.getElementById('touch-pause-btn').addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameState === 'playing') {
    gameState = 'paused';
    document.getElementById('pause-overlay').style.display = 'block';
  } else if (gameState === 'paused') {
    gameState = 'playing';
    document.getElementById('pause-overlay').style.display = 'none';
  }
}, { passive: false });

// ════════════════════════════════════════════
// MAIN LOOP
// ════════════════════════════════════════════
let lastT = 0;

function animate(t) {
  requestAnimationFrame(animate);
  const dt = Math.min((t - lastT) / 1000, 0.1);
  lastT = t;

  const ts = t * 0.001;

  // Fire light flicker
  fireLights.forEach((fl, i) => {
    fl.intensity = 2.0 + Math.sin(ts * 4.5 + i * 1.7) * 0.9 + Math.sin(ts * 9 + i*2) * 0.4;
  });

  if (gameState === 'playing') {
    elapsedTime += dt;
    updateTimerHUD();

    // Shoot cooldown
    if (!canShoot) { shootCooldown -= dt; if (shootCooldown <= 0) canShoot = true; }

    // Combo decay
    if (combo > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }

    // ── リコイル視覚スナップ減衰（演出のみ、素早く消える）──
    recoilPitch *= Math.max(0, 1 - dt * 18);
    recoilYaw   *= Math.max(0, 1 - dt * 22);

    // Spawn
    const diff = getDifficulty(elapsedTime);
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnZombie(diff);
      if (elapsedTime > 90  && Math.random() < 0.3) spawnZombie(diff);
      if (elapsedTime > 150 && Math.random() < 0.5) spawnZombie(diff);
      if (elapsedTime > 210 && Math.random() < 0.4) spawnZombie(diff);
      spawnTimer = diff.interval * (0.8 + Math.random() * 0.4);
    }

    // Update zombies
    const toRemove = [];
    zombies.forEach((z, i) => {
      const r = z.update(dt);
      if (r === 'missed') { recordMiss(); toRemove.push(i); }
      else if (r === 'remove') toRemove.push(i);
    });
    for (let i = toRemove.length - 1; i >= 0; i--) zombies.splice(toRemove[i], 1);

    // Camera（リコイルオフセット加算）
    camera.rotation.y = yaw   + recoilYaw;
    camera.rotation.x = pitch + recoilPitch;

    // Scope dist（スコープ中は毎フレーム更新）
    if (isScoped) updateScopeDist();

    drawMinimap();

  } else {
    // Title / gameover: slow pan
    yaw += dt * 0.08;
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;
  }

  renderer.render(scene, camera);
}

function spawnZombie(diff) {
  // Spawn from sides or far end
  let x, z;
  const side = Math.random();
  if (side < 0.6) {
    x = (Math.random() - 0.5) * 72;
    z = SPAWN_Z_FAR + Math.random() * (SPAWN_Z_NEAR - SPAWN_Z_FAR);
  } else if (side < 0.8) {
    x = -45 - Math.random() * 15;
    z = -20 - Math.random() * 60;
  } else {
    x = 45 + Math.random() * 15;
    z = -20 - Math.random() * 60;
  }
  zombies.push(new Zombie(x, z, diff.hp, diff.speed * (0.85 + Math.random() * 0.3)));
}

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Kick off
requestAnimationFrame(animate);
</script>
